name: Fullstack Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:

  backend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Testing/Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -v

  frontend-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Testing/Frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        
      - name: Run frontend tests
        run: npm test